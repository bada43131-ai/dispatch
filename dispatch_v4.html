<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>송도 배차 플래너</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:12px;background:#fff;color:#111;max-width:600px;margin:0 auto;}
h2{font-size:15px;font-weight:700;margin-bottom:4px;color:#222;}
.sub{font-size:11px;color:#888;margin-bottom:14px;}
.section-title{font-size:12px;font-weight:700;color:#555;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid #eee;}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px;}
.input-row{display:flex;align-items:center;justify-content:space-between;background:#f7f7f7;border-radius:8px;padding:7px 10px;}
.input-label{font-size:11px;color:#555;flex:1;display:flex;align-items:center;gap:4px;}
.type-dot{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cur-input{width:44px;height:30px;border:1px solid #ddd;border-radius:6px;text-align:center;font-size:13px;font-weight:700;background:#fff;}
.apply-btn{width:100%;padding:12px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin:8px 0 0;-webkit-tap-highlight-color:transparent;}
.apply-btn:active{background:#0d4a8a;}
.excl-row{display:flex;align-items:center;justify-content:space-between;background:#f7f7f7;border-radius:8px;padding:7px 10px;cursor:pointer;}
.excl-row.excluded{background:#FEE2E2;}
.excl-label{font-size:11px;flex:1;display:flex;align-items:center;gap:4px;}
.excl-toggle{width:28px;height:18px;border-radius:9px;position:relative;flex-shrink:0;transition:background 0.2s;}
.excl-toggle .knob{position:absolute;top:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left 0.2s;}
.excl-toggle.on{background:#DC2626;}.excl-toggle.on .knob{left:12px;}
.excl-toggle.off{background:#ccc;}.excl-toggle.off .knob{left:2px;}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;background:#f7f7f7;border-radius:10px;padding:10px 12px;}
.ctrl-label{font-size:13px;color:#444;font-weight:600;}
.ctrl-right{display:flex;align-items:center;}
.btn{width:38px;height:38px;border:none;background:#e0e0e0;font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333;user-select:none;-webkit-tap-highlight-color:transparent;}
.btn:active{background:#bbb;}
.btn-minus{border-radius:8px 0 0 8px;}
.btn-plus{border-radius:0 8px 8px 0;}
.ctrl-val{min-width:54px;text-align:center;font-size:16px;font-weight:700;background:#fff;height:38px;display:flex;align-items:center;justify-content:center;border-top:1px solid #ddd;border-bottom:1px solid #ddd;}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.metric{background:#f5f5f5;border-radius:8px;padding:8px 4px;text-align:center;}
.metric-label{font-size:10px;color:#888;margin-bottom:2px;}
.metric-value{font-size:16px;font-weight:700;}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
th{padding:6px 4px;font-size:11px;color:#888;border-bottom:1px solid #eee;text-align:left;font-weight:500;}
td{padding:6px 4px;border-bottom:1px solid #f0f0f0;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.zone-hd td{background:#efefef;font-size:11px;font-weight:700;color:#555;white-space:normal;padding:5px 6px;}
.subtotal td{background:#fafafa;font-weight:700;font-size:11px;border-top:1px solid #ddd;}
.grandtotal td{font-weight:700;font-size:12px;border-top:2px solid #bbb;background:#f5f5f5;}
.unselected{opacity:0.3;}
.excluded-row{opacity:0.25;background:#fff5f5;}
.skip-row td{color:#aaa;font-style:italic;}
.rank{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;font-size:9px;font-weight:700;margin-right:3px;flex-shrink:0;}
.badge{display:inline-block;padding:1px 4px;border-radius:3px;font-size:9px;font-weight:700;}
.mixed{background:#FFF3CD;color:#856404;}
.inflow{background:#D1FAE5;color:#065F46;}
.consume{background:#FEE2E2;color:#991B1B;}
.bar-wrap{width:100%;height:5px;background:#eee;border-radius:3px;position:relative;overflow:hidden;}
.comment{margin-top:10px;padding:8px 10px;background:#f0f0f0;border-radius:8px;font-size:11px;color:#555;line-height:1.6;}
.legend{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.legend span{font-size:10px;color:#666;display:flex;align-items:center;gap:3px;}
.legend-dot{width:10px;height:5px;border-radius:2px;display:inline-block;}
.save-btn{width:100%;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.repair-row{display:flex;align-items:center;justify-content:space-between;background:#fff8f0;border-radius:8px;padding:8px 12px;margin-bottom:6px;}
</style>
</head>
<body>

<h2>송도 배차 플래너</h2>
<div class="sub">현재수량 입력 → 배차수량 조절 → 현재수량 반영</div>

<!-- ① 현재수량 입력 -->
<div class="section-title">① 현재수량 입력</div>
<div class="input-grid" id="input-grid"></div>

<!-- 현재수량 합계 표시 -->
<div id="cur-total-row" style="display:flex;justify-content:flex-end;align-items:center;padding:4px 10px;margin-top:2px;">
  <span id="cur-total" style="font-size:12px;font-weight:700;color:#185FA5;background:#EFF6FF;padding:3px 10px;border-radius:6px;"></span>
</div>

<!-- ② 배차 설정 -->
<div class="section-title">② 배차 설정</div>
<div class="ctrl-row">
  <div class="ctrl-label">배차 포인트 수</div>
  <div class="ctrl-right">
    <button class="btn btn-minus" onclick="adj('spot',-1)">−</button>
    <div class="ctrl-val" id="spot-val">6곳</div>
    <button class="btn btn-plus" onclick="adj('spot',1)">+</button>
  </div>
</div>
<div class="ctrl-row">
  <div class="ctrl-label">총 배차수량</div>
  <div class="ctrl-right">
    <button class="btn btn-minus" onclick="adj('total',-1)">−</button>
    <div class="ctrl-val" id="total-val">50대</div>
    <button class="btn btn-plus" onclick="adj('total',1)">+</button>
  </div>
</div>
<button class="apply-btn" onclick="applyInputs()">현재수량 반영하기</button>

<!-- 요약 -->
<div class="metric-grid" style="margin-top:10px;">
  <div class="metric"><div class="metric-label">선택포인트</div><div class="metric-value" id="m-spot">-</div></div>
  <div class="metric"><div class="metric-label">B존</div><div class="metric-value" style="color:#0F6E56" id="m-b">-</div></div>
  <div class="metric"><div class="metric-label">A존</div><div class="metric-value" style="color:#185FA5" id="m-a">-</div></div>
  <div class="metric"><div class="metric-label">달성율</div><div class="metric-value" id="m-pct">-</div></div>
</div>

<div class="legend">
  <span><span class="legend-dot" style="background:#1D9E75;"></span>B존 ~100%</span>
  <span><span class="legend-dot" style="background:#378ADD;"></span>A존 ~100%</span>
  <span><span class="legend-dot" style="background:#F59E0B;"></span>100~110%</span>
  <span><span class="legend-dot" style="background:#eee;"></span>90%↑ 배차제외</span>
</div>

<table>
  <colgroup>
    <col style="width:37%"><col style="width:11%"><col style="width:13%"><col style="width:13%"><col style="width:26%">
  </colgroup>
  <thead>
    <tr>
      <th>현장명</th>
      <th style="text-align:center;">현재</th>
      <th style="text-align:center;">배차</th>
      <th style="text-align:center;">배차후</th>
      <th>달성율</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>
<div class="comment" id="comment"></div>

<!-- DB 저장 섹션 -->
<div style="margin-top:14px;">
  <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #eee;">📊 데이터 저장</div>

  <!-- 아침 확정 저장 -->
  <div style="margin-bottom:8px;">
    <button onclick="saveMorning()" id="btn-morning" class="save-btn" style="background:#185FA5;color:#fff;">
      ① 아침 현재수량 확정 저장 (하루 1회)
    </button>
    <div id="morning-status" style="font-size:11px;color:#888;text-align:center;margin-top:4px;"></div>
  </div>

  <!-- 실제 배차량 + 수리물량 -->
  <div id="dispatch-section" style="display:none;">
    <div style="font-size:11px;color:#555;margin-bottom:6px;font-weight:600;">② 오늘 실제 배차량 입력 (작업 완료 후)</div>
    <div class="input-grid" id="dispatch-grid"></div>

    <!-- 배차 합계 -->
    <div style="display:flex;justify-content:flex-end;margin-top:2px;margin-bottom:4px;">
      <span id="disp-total" style="font-size:12px;font-weight:700;color:#0F6E56;background:#ECFDF5;padding:3px 10px;border-radius:6px;"></span>
    </div>

    <!-- 수리 물량 -->
    <div style="font-size:11px;color:#555;margin:12px 0 6px;font-weight:600;">③ 오늘 수리 물량 (고장 바이크)</div>
    <div class="repair-row">
      <span style="font-size:13px;color:#555;font-weight:600;">수리 완료 대수</span>
      <input type="number" id="repair-count" value="0" min="0" max="50"
        style="width:52px;height:32px;border:1px solid #ddd;border-radius:6px;text-align:center;font-size:14px;font-weight:700;background:#fff;">
    </div>

    <!-- 저장 버튼 -->
    <button onclick="saveDispatch()" class="save-btn" style="background:#0F6E56;color:#fff;margin-top:12px;">
      실제 배차량 + 수리 물량 저장
    </button>
    <div id="dispatch-status" style="font-size:11px;color:#888;text-align:center;margin-top:4px;"></div>
  </div>
</div>

<!-- 옵션: 제외 포인트 -->
<div style="margin-top:16px;">
  <div onclick="toggleExclPanel()" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#f7f7f7;border-radius:10px;cursor:pointer;user-select:none;">
    <span style="font-size:12px;font-weight:700;color:#555;">⚙ 특정 포인트 배차 제외 (옵션) <span id="excl-count" style="color:#DC2626;font-size:11px;font-weight:600;"></span></span>
    <span id="excl-arrow" style="font-size:14px;color:#888;transition:transform 0.2s;">▼</span>
  </div>
  <div id="excl-panel" style="display:none;margin-top:6px;">
    <div style="font-size:11px;color:#888;margin-bottom:8px;padding:0 4px;">오늘 배차하지 않을 포인트를 선택하세요</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;" id="exclude-grid"></div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyz1jsjXBxDpU01opnhX1W447B5pDHtE3ZmyYpwcmRt5UKXfoLKadjeEGkUZKPbwW3B/exec';

let spots=6, budget=50;
const excluded=new Set();

const bPoints=[
  {name:'힐스테이트',   zone:'B',opt:12,cur:7, type:'mixed'},
  {name:'이편한세상',   zone:'B',opt:20,cur:17,type:'mixed'},
  {name:'송도국제학교', zone:'B',opt:15,cur:13,type:'mixed'},
  {name:'더샵마스터뷰', zone:'B',opt:15,cur:13,type:'inflow'},
  {name:'지식정보단지', zone:'B',opt:20,cur:17,type:'consume'},
  {name:'라이크홈',     zone:'B',opt:17,cur:16,type:'consume'},
];
const aPoints=[
  {name:'인천대1번',    zone:'A',opt:18,cur:9, type:'mixed'},
  {name:'송도시외버스', zone:'A',opt:15,cur:7, type:'consume'},
  {name:'인천대2번',    zone:'A',opt:15,cur:8, type:'consume'},
  {name:'테라스정원',   zone:'A',opt:20,cur:12,type:'consume'},
  {name:'산책정원',     zone:'A',opt:20,cur:12,type:'consume'},
  {name:'센트럴파크',   zone:'A',opt:12,cur:8, type:'consume'},
  {name:'타임스페이스', zone:'A',opt:15,cur:14,type:'consume'},
];
const all=[...bPoints,...aPoints];
const optSum=all.reduce((s,p)=>s+p.opt,0);

function buildInputs(){
  const grid=document.getElementById('input-grid');
  grid.innerHTML='';
  const allIds=all.map(p=>'inp-'+p.name);
  all.forEach((p,idx)=>{
    const typeColor=p.type==='mixed'?'#D97706':p.type==='inflow'?'#059669':'#DC2626';
    const zColor=p.zone==='B'?'#0F6E56':'#185FA5';
    const nextFocus=`const ids=${JSON.stringify(allIds)};const ni=ids.indexOf(this.id)+1;if(ni<ids.length){const nx=document.getElementById(ids[ni]);nx.focus();nx.select();}`;
    grid.innerHTML+=`<div class="input-row">
      <div class="input-label">
        <span class="type-dot" style="background:${typeColor};"></span>
        <span style="color:${zColor};font-weight:700;font-size:10px;">[${p.zone}]</span>${p.name}
      </div>
      <input class="cur-input" type="number" id="inp-${p.name}" placeholder="0" min="0" max="30"
        oninput="update();updateCurTotal()"
        onfocus="this.select()"
        onkeydown="if(event.key==='Enter'){event.preventDefault();${nextFocus}}">
    </div>`;
  });
  updateCurTotal();
}

function updateCurTotal(){
  const el=document.getElementById('cur-total');
  if(!el) return;
  const total=all.reduce((s,p)=>{
    const v=parseInt(document.getElementById('inp-'+p.name)?.value)||0;
    return s+v;
  },0);
  el.textContent='현재수량 합계: '+total+'대';
}

function buildDispatchGrid(){
  const grid=document.getElementById('dispatch-grid');
  if(!grid) return;
  grid.innerHTML='';
  const dispIds=all.map(p=>'disp-'+p.name);
  all.forEach((p,idx)=>{
    const typeColor=p.type==='mixed'?'#D97706':p.type==='inflow'?'#059669':'#DC2626';
    const zColor=p.zone==='B'?'#0F6E56':'#185FA5';
    const nextFocus=`const ids=${JSON.stringify(dispIds)};const ni=ids.indexOf(this.id)+1;if(ni<ids.length){const nx=document.getElementById(ids[ni]);nx.focus();nx.select();}`;
    grid.innerHTML+=`<div class="input-row">
      <div class="input-label">
        <span class="type-dot" style="background:${typeColor};"></span>
        <span style="color:${zColor};font-weight:700;font-size:10px;">[${p.zone}]</span>${p.name}
      </div>
      <input class="cur-input" type="number" id="disp-${p.name}" placeholder="0" min="0" max="50"
        oninput="updateDispTotal()"
        onfocus="this.select()"
        onkeydown="if(event.key==='Enter'){event.preventDefault();${nextFocus}}">
    </div>`;
  });
}

function updateDispTotal(){
  const el=document.getElementById('disp-total');
  if(!el) return;
  const total=all.reduce((s,p)=>{
    const v=parseInt(document.getElementById('disp-'+p.name)?.value)||0;
    return s+v;
  },0);
  el.textContent='배차 합계: '+total+'대';
}

function buildExcludes(){
  const grid=document.getElementById('exclude-grid');
  grid.innerHTML='';
  all.forEach(p=>{
    const isExcl=excluded.has(p.name);
    const typeColor=p.type==='mixed'?'#D97706':p.type==='inflow'?'#059669':'#DC2626';
    const zColor=p.zone==='B'?'#0F6E56':'#185FA5';
    grid.innerHTML+=`<div class="excl-row${isExcl?' excluded':''}" onclick="toggleExclude('${p.name}')">
      <div class="excl-label">
        <span class="type-dot" style="background:${typeColor};"></span>
        <span style="color:${zColor};font-weight:700;font-size:10px;">[${p.zone}]</span>${p.name}
      </div>
      <div class="excl-toggle ${isExcl?'on':'off'}"><div class="knob"></div></div>
    </div>`;
  });
  const cnt=excluded.size;
  document.getElementById('excl-count').textContent=cnt>0?`(${cnt}곳 제외중)`:'';
}

function toggleExclude(name){
  if(excluded.has(name)) excluded.delete(name);
  else excluded.add(name);
  buildExcludes();
  update();
}

function toggleExclPanel(){
  const panel=document.getElementById('excl-panel');
  const arrow=document.getElementById('excl-arrow');
  const isOpen=panel.style.display!=='none';
  panel.style.display=isOpen?'none':'block';
  arrow.style.transform=isOpen?'':'rotate(180deg)';
}

function applyInputs(){
  all.forEach(p=>{
    const el=document.getElementById('inp-'+p.name);
    if(el){const v=parseInt(el.value);if(!isNaN(v)&&v>=0)p.cur=v;}
  });
  update();
}

function adj(type,delta){
  if(type==='spot'){spots=Math.min(11,Math.max(1,spots+delta));document.getElementById('spot-val').textContent=spots+'곳';}
  else{budget=Math.min(100,Math.max(0,budget+delta));document.getElementById('total-val').textContent=budget+'대';}
  update();
}

function getToday(){
  // 한국 시간(KST=UTC+9) 기준으로 날짜 계산
  const d=new Date(new Date().getTime()+9*60*60*1000);
  const s=d.toISOString();
  return s.substring(0,10);
}

function update(){
  // 현재수량 반영 + 지표 계산
  all.forEach(p=>{
    const el=document.getElementById('inp-'+p.name);
    if(el){const v=parseInt(el.value);if(!isNaN(v)&&v>=0)p.cur=v;}
    p.curPct=p.cur/p.opt;
    p.need100=Math.max(0,p.opt-p.cur);
    p.need110=Math.max(0,Math.floor(p.opt*1.1)-p.cur);
    // 90% 초과면 배차 대상 아님
    p.needsDispatch = p.curPct < 0.9;
    // A존: 회전율 낮은 곳(소비 적은 곳) 먼저 → 오후 5시 잔량 유지에 유리
    const avgConsume = {
      '힐스테이트':3,'이편한세상':2,'송도국제학교':2,'더샵마스터뷰':3,'지식정보단지':11,'라이크홈':8,
      '인천대1번':9,'송도시외버스':11,'인천대2번':9,'테라스정원':6,'산책정원':10,'센트럴파크':7,'타임스페이스':8
    };
    const consume = avgConsume[p.name] || 5;
    const shortageRatio = p.need100/p.opt;
    if(p.zone==='B'){
      p.score = p.needsDispatch ? shortageRatio*100 : -1;
    } else {
      // 소비 적을수록 + 부족량 클수록 우선
      p.score = p.needsDispatch ? (shortageRatio*50 + (20-consume)*3) : -1;
    }
  });
  const curSum=all.reduce((s,p)=>s+p.cur,0);

  // B존: 90% 이하 전부 무조건 배차 (포인트 수 제한 없음, 제외 설정 제외)
  const bMust = bPoints.filter(p=>!excluded.has(p.name) && p.needsDispatch);
  const bSel = new Set(bMust.map(p=>p.name));

  // A존: 90% 이하 중 포인트 수 슬라이더 기준으로 선택 (부족량 큰 순)
  const aDispatchable = aPoints
    .filter(p=>!excluded.has(p.name) && p.needsDispatch)
    .sort((a,b)=>b.score-a.score);
  const aSlots = Math.min(spots, aDispatchable.length);
  const aSel = new Set(aDispatchable.slice(0,aSlots).map(p=>p.name));

  all.forEach(p=>p.dispatch=0);
  let rem=budget;

  // 1단계: B존 100%까지 (무조건)
  bPoints.filter(p=>bSel.has(p.name)).forEach(p=>{
    const g=Math.min(p.need100,rem); p.dispatch=g; rem-=g;
  });
  // 2단계: B존 110%까지 (무조건, A존보다 먼저)
  if(rem>0) bPoints.filter(p=>bSel.has(p.name)).forEach(p=>{
    const e=Math.min(p.need110-p.dispatch,rem);
    if(e>0){p.dispatch+=e;rem-=e;}
  });
  // 3단계: A존 100%까지 (B존 완료 후 잔여 예산으로)
  if(rem>0) aPoints.filter(p=>aSel.has(p.name)).forEach(p=>{
    const g=Math.min(p.need100,rem); p.dispatch=g; rem-=g;
  });
  // 4단계: A존 110%까지
  if(rem>0) aPoints.filter(p=>aSel.has(p.name)).forEach(p=>{
    const e=Math.min(p.need110-p.dispatch,rem);
    if(e>0){p.dispatch+=e;rem-=e;}
  });

  const tB=bPoints.reduce((s,p)=>s+p.dispatch,0);
  const tA=aPoints.reduce((s,p)=>s+p.dispatch,0);
  const tD=tB+tA;
  const afterSum=all.reduce((s,p)=>s+p.cur+p.dispatch,0);
  const aPct=Math.round(afterSum/optSum*100);
  const pCol=aPct>=100?'#059669':aPct>=85?'#D97706':'#DC2626';

  document.getElementById('m-spot').textContent=bSel.size+'B+'+aSel.size+'A';
  document.getElementById('m-b').textContent=tB+'대';
  document.getElementById('m-a').textContent=tA+'대';
  document.getElementById('m-pct').textContent=aPct+'%';
  document.getElementById('m-pct').style.color=pCol;

  const tb=document.getElementById('table-body');
  tb.innerHTML='';

  // B존 → A존 순서로 표시, 선택된 곳 먼저
  [['B',bPoints,bSel,'#0F6E56','#1D9E75'],['A',aPoints,aSel,'#185FA5','#378ADD']].forEach(([z,pts,sel,zC,bC])=>{
    const allZonePts=z==='B'?bPoints:aPoints;
    const zOpt=allZonePts.reduce((s,p)=>s+p.opt,0);
    const zCur=allZonePts.reduce((s,p)=>s+p.cur,0);
    const zD=allZonePts.reduce((s,p)=>s+p.dispatch,0);
    const zAfter=allZonePts.reduce((s,p)=>s+p.cur+p.dispatch,0);
    const zPct=Math.round(zAfter/zOpt*100);
    const zPC=zPct>=100?'#059669':zPct>=85?'#D97706':'#DC2626';
    const zoneNote=z==='B'?'90%↓ 전체 무조건 배차':'포인트 수 설정 기준'; tb.innerHTML+=`<tr class="zone-hd"><td colspan="5">${z}존 — ${sel.size}곳 (${zoneNote})</td></tr>`;

    // 정렬: 선택된곳 → 90%초과(배차불필요) → 제외설정
    const sorted=[
      ...pts.filter(p=>sel.has(p.name)).sort((a,b)=>b.score-a.score),
      ...pts.filter(p=>!sel.has(p.name)&&!excluded.has(p.name)&&!p.needsDispatch),
      ...pts.filter(p=>!sel.has(p.name)&&!excluded.has(p.name)&&p.needsDispatch),
      ...pts.filter(p=>excluded.has(p.name)),
    ];

    let rank=1;
    sorted.forEach(p=>{
      const isExcl=excluded.has(p.name);
      const isSel=sel.has(p.name);
      const isSkip=!p.needsDispatch&&!isExcl;
      const ac=p.cur+p.dispatch;
      const ap=Math.round(ac/p.opt*100);
      const nW=Math.round(Math.min(100,ap)/110*100);
      const oW=ap>100?Math.round(Math.min(10,ap-100)/110*100):0;
      const dC=p.dispatch>0?zC:'#bbb';
      const pC=ap>=100?'#059669':ap>=85?'#D97706':'#DC2626';
      const tl=p.type==='inflow'?'유입':p.type==='mixed'?'혼합':'소비';
      const tc=p.type==='inflow'?'inflow':p.type==='mixed'?'mixed':'consume';
      const rowClass=isExcl?'excluded-row':isSkip?'skip-row':isSel?'':'unselected';
      const skipBadge=isSkip?'<span style="font-size:9px;background:#E0F2E9;color:#0F6E56;padding:1px 4px;border-radius:3px;font-weight:700;">90%↑</span> ':'';
      const exclBadge=isExcl?'<span style="font-size:9px;background:#FEE2E2;color:#991B1B;padding:1px 4px;border-radius:3px;font-weight:700;">제외</span> ':'';
      const rk=isSel
        ?`<span class="rank" style="background:${z==='A'?'#DBEAFE':'#D1FAE5'};color:${zC};">${rank++}</span>`
        :`<span style="display:inline-block;width:20px;"></span>`;

      tb.innerHTML+=`<tr class="${rowClass}">
        <td>${rk}${skipBadge}${exclBadge}<span style="font-weight:${isSel?'700':'400'}">${p.name}</span> <span class="badge ${tc}">${tl}</span></td>
        <td style="text-align:center;">${p.cur}</td>
        <td style="text-align:center;font-weight:700;color:${dC}">${p.dispatch>0?'+'+p.dispatch:isSkip?'✓':'-'}</td>
        <td style="text-align:center;font-weight:${isSel?'700':'400'}">${ac}${ap>=110?'▲':''}</td>
        <td><div style="display:flex;align-items:center;gap:3px;">
          <div class="bar-wrap">
            <div style="position:absolute;top:0;left:0;width:${nW}%;height:5px;background:${bC};opacity:${isSel?1:0.3};"></div>
            ${oW>0?`<div style="position:absolute;top:0;left:${nW}%;width:${oW}%;height:5px;background:#F59E0B;"></div>`:''}
          </div>
          <span style="font-size:11px;font-weight:700;color:${pC};min-width:28px;">${ap}%</span>
        </div></td>
      </tr>`;
    });
    tb.innerHTML+=`<tr class="subtotal"><td>소계</td><td style="text-align:center;">${zCur}</td><td style="text-align:center;color:${zC}">+${zD}</td><td style="text-align:center;">${zAfter}</td><td style="color:${zPC};font-weight:700;">${zPct}%</td></tr>`;
  });

  const lo=budget-tD;
  tb.innerHTML+=`<tr class="grandtotal"><td>전체</td><td style="text-align:center;">${curSum}</td><td style="text-align:center;">+${tD}</td><td style="text-align:center;">${curSum+tD}</td><td style="color:${pCol}">${aPct}%</td></tr>`;
  document.getElementById('comment').textContent=
    `B존 ${bSel.size}곳(무조건) + A존 ${aSel.size}곳 · B ${tB}대 · A ${tA}대 · 달성율 ${aPct}%`
    +(lo>0?` · 미배분 ${lo}대`:'')
    +(excluded.size>0?` · 제외 ${excluded.size}곳`:'');
}

// 아침 현재수량 확정 저장
async function saveMorning(){
  const btn=document.getElementById('btn-morning');
  const status=document.getElementById('morning-status');
  all.forEach(p=>{
    const el=document.getElementById('inp-'+p.name);
    if(el){const v=parseInt(el.value);if(!isNaN(v)&&v>=0)p.cur=v;}
  });
  const repair=parseInt(document.getElementById('repair-count').value)||0;
  const payload={
    type:'morning',
    date:getToday(),
    repair,
    points:all.map(p=>({name:p.name,zone:p.zone,type:p.type,opt:p.opt,cur:p.cur}))
  };
  btn.textContent='저장 중...';
  btn.disabled=true;
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)});
    btn.textContent='✓ 아침 데이터 저장 완료';
    btn.style.background='#059669';
    status.textContent=`${getToday()} 저장됨 · 수리 ${repair}대`;
    status.style.color='#059669';
    localStorage.setItem('morning_saved_date', getToday());
    // 아침 현재수량을 포인트별로 저장
    const morningMap={};
    all.forEach(p=>{ morningMap[p.name]=p.cur; });
    localStorage.setItem('morning_data_'+getToday(), JSON.stringify(morningMap));
    document.getElementById('dispatch-section').style.display='block';
    buildDispatchGrid();
  }catch(err){
    btn.textContent='① 아침 현재수량 확정 저장 (하루 1회)';
    btn.disabled=false;
    status.textContent='저장 실패 — 인터넷 연결 확인';
    status.style.color='#DC2626';
  }
}

// 실제 배차량 + 수리 저장
async function saveDispatch(){
  const status=document.getElementById('dispatch-status');
  // 아침 저장된 현재수량을 localStorage에서 가져오기
  const morningData = JSON.parse(localStorage.getItem('morning_data_'+getToday())||'{}');
  all.forEach(p=>{
    const de=document.getElementById('disp-'+p.name);
    p.actualDispatch=de?parseInt(de.value)||0:0;
    // 아침 현재수량: localStorage에 저장된 값 사용 (없으면 현재 입력값)
    const morningPoint = morningData[p.name];
    p.morningCur = morningPoint !== undefined ? morningPoint : (parseInt(document.getElementById('inp-'+p.name)?.value)||0);
  });
  const repair=parseInt(document.getElementById('repair-count').value)||0;
  const payload={
    type:'dispatch',
    date:getToday(),
    repair,
    points:all.map(p=>({name:p.name,zone:p.zone,type:p.type,opt:p.opt,cur:p.morningCur,dispatch:p.actualDispatch}))
  };
  status.textContent='저장 중...';
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)});
    status.textContent=`✓ ${getToday()} 배차실적 + 수리 ${repair}대 저장 완료`;
    status.style.color='#059669';
  }catch(err){
    status.textContent='저장 실패 — 인터넷 연결 확인';
    status.style.color='#DC2626';
  }
}

buildInputs();
buildExcludes();

// ── 북마크릿 해시 파라미터 읽기 + 수리/배터리 표시 ──────────
(function(){
  var hash = window.location.hash.substring(1);
  if(!hash) return;
  var params = {};
  hash.split('&').forEach(function(part){
    var eq = part.indexOf('=');
    if(eq < 1) return;
    try{
      var k = decodeURIComponent(part.substring(0, eq));
      var v = part.substring(eq + 1);
      params[k] = v;
    }catch(e){}
  });

  // ① 각 포인트 현재수량 입력란 채우기
  all.forEach(function(p){
    if(params[p.name] !== undefined){
      var el = document.getElementById('inp-' + p.name);
      if(el) el.value = parseInt(params[p.name]) || 0;
    }
  });
  updateCurTotal();

  // ② 수리 바이크 파싱
  var repairData = [];
  if(params.repair){
    try{ repairData = JSON.parse(decodeURIComponent(params.repair)); }catch(e){}
    var rc = document.getElementById('repair-count');
    if(rc) rc.value = repairData.length;
  }

  // ③ 배터리 바이크 파싱
  var batteryData = [];
  if(params.battery){
    try{ batteryData = JSON.parse(decodeURIComponent(params.battery)); }catch(e){}
  }

  // ④ 수리/배터리 정보 패널 표시
  if(repairData.length === 0 && batteryData.length === 0) return;
  var panel = document.createElement('div');
  panel.id = 'live-info-panel';
  panel.style.cssText = 'margin:8px 0 12px;';
  var html = '';

  // 수리 섹션
  if(repairData.length > 0){
    var field = repairData.filter(function(d){return d.repairType==='FIELD';});
    var wh    = repairData.filter(function(d){return d.repairType!=='FIELD';});
    html += '<div style="font-size:12px;font-weight:700;color:#555;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid #eee;">🔧 수리 바이크 '+repairData.length+'대</div>';
    if(field.length > 0){
      html += '<div style="margin-bottom:6px;">';
      html += '<span style="font-size:10px;font-weight:700;background:#FEE2E2;color:#991B1B;padding:2px 8px;border-radius:10px;">현장 '+field.length+'대</span>';
      field.forEach(function(d){
        html += '<div style="display:flex;align-items:center;gap:5px;padding:5px 8px;margin-top:3px;background:#FFF5F5;border-radius:7px;">';
        html += '<span style="font-size:12px;font-weight:700;color:#333;">'+d.code+'</span>';
        html += '<span style="font-size:10px;background:#FECACA;color:#991B1B;padding:1px 5px;border-radius:3px;">'+d.model+'</span>';
        if(d.comments && d.comments.length){
          html += '<span style="font-size:10px;color:#888;">'+d.comments.join(' · ')+'</span>';
        }
        html += '</div>';
      });
      html += '</div>';
    }
    if(wh.length > 0){
      html += '<div style="font-size:11px;color:#888;background:#f7f7f7;border-radius:6px;padding:5px 8px;margin-bottom:4px;">';
      html += '창고 수리 '+wh.length+'대: '+wh.map(function(d){return d.code+'('+d.model+')';}).join(', ');
      html += '</div>';
    }
  }

  // 배터리 섹션
  if(batteryData.length > 0){
    var gfCnt    = batteryData.filter(function(d){return d.model==='GF';}).length;
    var otherCnt = batteryData.length - gfCnt;
    html += '<div style="font-size:12px;font-weight:700;color:#555;margin:10px 0 6px;padding-bottom:3px;border-bottom:1px solid #eee;">🔋 배터리 교체 '+batteryData.length+'대 <span style="font-size:10px;font-weight:400;color:#888;">(GF:'+gfCnt+' / 기타:'+otherCnt+')</span></div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:4px;">';
    batteryData.forEach(function(d){
      html += '<div style="display:inline-flex;align-items:center;gap:3px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:6px;padding:3px 7px;">';
      html += '<span style="font-size:11px;font-weight:700;color:#333;">'+d.code+'</span>';
      html += '<span style="font-size:9px;color:#92400E;background:#FEF3C7;padding:1px 3px;border-radius:2px;">'+d.model+'</span>';
      html += '<span style="font-size:10px;color:#D97706;font-weight:700;">'+d.battery+'%</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  panel.innerHTML = html;
  // ② 배차 설정 섹션 바로 앞에 삽입
  var titles = document.querySelectorAll('.section-title');
  if(titles.length >= 2){
    titles[1].parentNode.insertBefore(panel, titles[1]);
  }
})();
// ────────────────────────────────────────────────────────────

update();
checkMorningSaved();

// 페이지 열릴때 오늘 아침 저장 여부 확인
async function checkMorningSaved(){
  const today = getToday();
  const savedDate = localStorage.getItem('morning_saved_date');
  if(savedDate === today){
    // 오늘 이미 저장됨 → 배차실적 바로 표시
    const btn = document.getElementById('btn-morning');
    btn.textContent = '✓ 아침 데이터 저장 완료';
    btn.style.background = '#059669';
    document.getElementById('morning-status').textContent = today + ' 저장됨';
    document.getElementById('morning-status').style.color = '#059669';
    document.getElementById('dispatch-section').style.display = 'block';
    buildDispatchGrid();
  }
}
