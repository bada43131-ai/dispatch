<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
<title>이미지 보기</title>
</head>
<body style="margin:0;background:#0b1320;color:#cfe0f5;font-family:sans-serif;">
<script>
  // 카드의 '크게 보기' 링크로 들어오면, 원본 이미지 파일로 바로 넘긴다.
  // 이미지 파일을 직접 열면 브라우저 기본(네이티브) 핀치줌이 그대로 동작한다.
  (function(){
    var s = new URLSearchParams(location.search).get('img');
    if (s && /^https?:\/\//i.test(s)) {
      location.replace(s);
    } else {
      document.body.innerHTML =
        '<div style="display:flex;height:100vh;align-items:center;justify-content:center;padding:24px;text-align:center;">이미지 주소가 없습니다. (?img=... 필요)</div>';
    }
  })();
</script>
</body>
</html>
